name: CI

permissions:
  contents: read
  checks: write
  issues: write
  pull-requests: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer

      - name: Validate composer.json
        run: composer validate --strict

      - name: Check for security advisories
        run: composer audit

  cs-fixer:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHP-CS-Fixer
        run: vendor/bin/php-cs-fixer fix --config=.php-cs-fixer.dist.php --allow-risky=yes --using-cache=no --dry-run --diff

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Prepare log directory
        run: mkdir -p build/logs

      - name: PHPStan
        run: |
          vendor/bin/phpstan analyse --configuration=phpstan.neon.dist --memory-limit=512M --error-format=table \
            | tee build/logs/phpstan.log

  phpunit:
    name: PHP ${{ matrix.php }} Tests (${{ matrix.dependency-versions }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        coverage: [false]
        dependency-versions: ['highest']
        include:
          - php: '8.4'
            coverage: true
            dependency-versions: 'highest'
          - php: '8.2'
            coverage: false
            dependency-versions: 'lowest'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: ${{ matrix.coverage && 'xdebug' || 'none' }}
          extensions: mbstring
          tools: composer

      - name: Install dependencies
        run: |
          if [ "${{ matrix.dependency-versions }}" = "lowest" ]; then
            composer update --prefer-lowest --prefer-stable --no-progress
          else
            composer install --prefer-dist --no-progress
          fi

      - name: Prepare log directory
        run: mkdir -p build/logs

      - name: PHPUnit
        run: >
          vendor/bin/phpunit
          --log-junit build/logs/phpunit-${{ matrix.php }}.xml
          ${{ matrix.coverage && '--coverage-clover build/logs/clover.xml' || '' }}

      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@v5
        with:
          files: build/logs/clover.xml
          fail_ci_if_error: false

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-php-${{ matrix.php }}-${{ matrix.dependency-versions }}
          path: build/logs/
          retention-days: 7

  quality-report:
    name: Quality Report
    runs-on: ubuntu-latest
    needs: [validate, cs-fixer, phpstan, phpunit]
    if: always()
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: test-results-php-*
          merge-multiple: true

      - name: Determine reporting mode
        id: reporting
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            echo "check_run=false" >>"$GITHUB_OUTPUT"
            echo "comment_mode=off" >>"$GITHUB_OUTPUT"
            echo "should_run=true" >>"$GITHUB_OUTPUT"
          else
            echo "check_run=true" >>"$GITHUB_OUTPUT"
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              echo "comment_mode=always" >>"$GITHUB_OUTPUT"
            else
              echo "comment_mode=off" >>"$GITHUB_OUTPUT"
            fi
            echo "should_run=true" >>"$GITHUB_OUTPUT"
          fi

      - name: Publish unit test results
        if: steps.reporting.outputs.should_run == 'true'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: artifacts/**/*.xml
          check_run: ${{ steps.reporting.outputs.check_run }}
          comment_mode: ${{ steps.reporting.outputs.comment_mode }}
