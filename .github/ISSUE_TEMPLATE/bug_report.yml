name: Bug Report
description: Report a bug in the CQRS bundle
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP Version
      placeholder: "8.2 / 8.3 / 8.4"
    validations:
      required: true

  - type: input
    id: symfony-version
    attributes:
      label: Symfony Version
      placeholder: "7.2"
    validations:
      required: true

  - type: input
    id: bundle-version
    attributes:
      label: Bundle Version
      placeholder: "0.4.0"
    validations:
      required: false

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the bug.
      placeholder: |
        1. Configure the bundle with...
        2. Dispatch a command...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true
